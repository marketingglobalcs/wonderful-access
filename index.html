<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ワンダフル美容外科｜アクセス</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f9f6f2; }
    .header {
      background: #3d2050;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .header h1 { font-size: 18px; margin-bottom: 4px; }
    .header p  { font-size: 13px; opacity: 0.8; }
    .map-wrap  { width: 100%; height: 60vh; }
    .map-wrap iframe { width: 100%; height: 100%; border: none; }
    .info {
      padding: 20px 16px;
      max-width: 480px;
      margin: 0 auto;
    }
    .badge {
      display: inline-block;
      background: #E8593C;
      color: white;
      font-size: 13px;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .info p { font-size: 14px; color: #444; line-height: 1.8; }
    .btn {
      display: block;
      margin: 16px auto 0;
      background: #06C755;
      color: white;
      text-align: center;
      padding: 14px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: bold;
      max-width: 480px;
    }
  </style>
</head>
<body>

  <div class="header">

    <p>원더풀성형외과의원</p>

  <div class="map-wrap">

      allowfullscreen=""
      loading="lazy"

  </div>

  <div class="info">
    <span class="badge">🚇 江南駅 10番出口 徒歩2分</span>
    <p>
      ソウル特別市 江南区 江南大路 地上<br>

      日本語スタッフ在籍・LINE相談無料
    </p>
  </div>

  <a class="btn" href="https://lin.ee/sVuCMuV">
    💬 LINEで無料相談する

</body>
</html>
